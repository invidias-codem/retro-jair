    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script>
      (function() {
        try {
          document.documentElement.classList.add('fonts-pending');
          document.fonts.load('16px VT323').then(function() {
            document.documentElement.classList.remove('fonts-pending');
            document.documentElement.classList.add('fonts-ready');
          });
          setTimeout(function() {
            document.documentElement.classList.remove('fonts-pending');
            document.documentElement.classList.add('fonts-ready');
          }, 2500);
        } catch (e) {}
      })();
    </script>
    <link href="/fonts/FiraCode-Regular.ttf" rel="preload" as="font" type="font/truetype" crossorigin>
    <link href="/fonts/FiraCode-SemiBold.ttf" rel="preload" as="font" type="font/truetype" crossorigin>
    <link href="/fonts/Teko-Medium.ttf" rel="preload" as="font" type="font/truetype" crossorigin>
    <link href="/fonts/RobotoMono-Regular.ttf" rel="preload" as="font" type="font/truetype" crossorigin>

    <style>
